{% extends 'base.html' %}
{% block title %}Grade Submission - SMK IT AL-MUKARROMAH LMS{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Grade Submission</h1>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="flex gap-4 mt-8">
                <button type="submit" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">
                    <i class="fas fa-save mr-2"></i>Save Grade
                </button>
                <a href="javascript:history.back()" class="bg-gray-600 text-white px-6 py-3 rounded-lg hover:bg-gray-700">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
