{% extends 'base.html' %}
{% block title %}Edit Assignment - SMK IT AL-MUKARROMAH LMS{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">
            <i class="fas fa-pencil text-yellow-600 mr-2"></i>Edit Assignment
        </h1>

        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-4">
                    <label for="{{ field.id_for_label }}" class="block text-sm font-bold text-gray-800 mb-2">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-red-600 text-sm mt-2">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="flex gap-4 mt-8">
                <button type="submit" class="bg-yellow-600 text-white px-6 py-3 rounded-lg hover:bg-yellow-700">
                    <i class="fas fa-save mr-2"></i>Save Changes
                </button>
                <a href="{% url 'assignments:teacher_list' %}" class="bg-gray-600 text-white px-6 py-3 rounded-lg hover:bg-gray-700">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
